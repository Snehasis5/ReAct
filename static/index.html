<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Heva Agent Playground</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
<style>
  :root {
    --bg: #0f1115; --panel: #161923; --border: #262a35; --text: #e7e9ee;
    --muted: #8b90a0; --accent: #7aa2f7; --ok: #7ee787; --fail: #ff9b9b;
    --thought: #f4d35e; --eval: #c3a6ff; --recover: #ffcf86; --code-bg: #0b0d12;
  }
  * { box-sizing: border-box; }
  body { margin:0; font-family: -apple-system, "Segoe UI", Roboto, sans-serif; background:var(--bg); color:var(--text); }
  .layout { display:flex; height:100vh; }
  .sidebar { width:280px; border-right:1px solid var(--border); padding:16px; overflow-y:auto; flex-shrink:0; }
  .sidebar h2 { font-size:13px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); margin:0 0 10px; }
  .run-item { padding:8px 10px; border-radius:8px; font-size:13px; margin-bottom:6px; cursor:pointer; border:1px solid var(--border); }
  .run-item:hover { background:var(--panel); }
  .main { flex:1; display:flex; flex-direction:column; min-width:0; }
  .header { padding:16px 24px; border-bottom:1px solid var(--border); flex-shrink:0; }
  .header h1 { font-size:16px; margin:0 0 4px; }
  .header p { font-size:13px; color:var(--muted); margin:0; }
  .trace { flex:1; overflow-y:auto; padding:20px 24px; }
  .composer { border-top:1px solid var(--border); padding:14px 24px; display:flex; gap:10px; align-items:center; flex-shrink:0; }
  .composer input[type=text] { flex:1; background:var(--panel); border:1px solid var(--border); color:var(--text); padding:10px 12px; border-radius:8px; font-size:14px; }
  .composer button { background:var(--accent); color:#0f1115; border:none; padding:10px 16px; border-radius:8px; font-weight:600; cursor:pointer; font-size:14px; }
  .composer button:disabled { opacity:.5; cursor:not-allowed; }
  .toggle { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--muted); white-space:nowrap; }

  .card { border:1px solid var(--border); border-radius:10px; padding:12px 14px; margin-bottom:12px; background:var(--panel); }
  .card .head { font-size:12px; color:var(--muted); margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; }
  .thought { color:var(--thought); font-size:13.5px; line-height:1.5; margin-bottom:10px; white-space:pre-wrap; }

  .action-line { display:flex; align-items:baseline; gap:8px; font-size:13px; margin-bottom:6px; flex-wrap:wrap; }
  .tool-name { color:var(--accent); font-family: ui-monospace, monospace; font-weight:600; }
  .param-chip { font-family: ui-monospace, monospace; font-size:11.5px; background:#1c202c; color:#b8bcc8; padding:2px 8px; border-radius:6px; }

  .block-label { font-size:11px; color:var(--muted); margin:8px 0 4px; text-transform:uppercase; letter-spacing:.04em; }
  pre.codeblock { margin:0; background:var(--code-bg); border-radius:8px; padding:10px 12px; overflow-x:auto; font-size:12.5px; line-height:1.5; }
  pre.codeblock code { font-family: ui-monospace, "SF Mono", monospace; background:none; padding:0; }
  .plain-block { background:var(--code-bg); border-radius:8px; padding:10px 12px; font-family: ui-monospace, monospace; font-size:12.5px; line-height:1.5; white-space:pre-wrap; word-break:break-word; color:#d3d6de; }
  .error-block { background:#241212; border:1px solid #4a2020; border-radius:8px; padding:10px 12px; font-family: ui-monospace, monospace; font-size:12.5px; color:var(--fail); white-space:pre-wrap; word-break:break-word; }

  .stat-row { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
  .stat-pill { font-size:11.5px; padding:3px 9px; border-radius:12px; background:#1c202c; color:#b8bcc8; }
  .stat-pill.good { background:#1e3a2a; color:var(--ok); }
  .stat-pill.bad { background:#3a1e1e; color:var(--fail); }

  .badge { display:inline-block; padding:1px 8px; border-radius:10px; font-size:11px; margin-left:6px; }
  .badge.ok { background:#1e3a2a; color:var(--ok); }
  .badge.fail { background:#3a1e1e; color:var(--fail); }

  .eval-box { border-left:3px solid var(--eval); padding:6px 10px; margin-top:10px; font-size:12.5px; color:#d8c9ff; background:rgba(195,166,255,0.06); border-radius:0 6px 6px 0; }
  .recovery-box { border-left:3px solid var(--recover); padding:6px 10px; margin-top:10px; font-size:12.5px; color:#ffe0ab; background:rgba(255,207,134,0.06); border-radius:0 6px 6px 0; }

  .plan-box { border:1px dashed var(--border); border-radius:10px; padding:12px 14px; margin-bottom:16px; font-size:13px; }
  .plan-box .plan-title { font-weight:600; margin-bottom:6px; }
  .plan-box ul { margin:0; padding-left:18px; }
  .plan-box li { margin-bottom:4px; color:var(--muted); }
  .plan-box li b { color:var(--text); font-family: ui-monospace, monospace; font-weight:600; }

  .final-box { border:1px solid #2a4a33; background:#12241a; border-radius:10px; padding:14px; margin-top:10px; font-size:13.5px; line-height:1.5; }
  .final-box .final-title { font-weight:600; margin-bottom:6px; }

  .empty { color:var(--muted); font-size:14px; padding:40px 0; text-align:center; }
  a { color:var(--accent); }
</style>
</head>
<body>
<div class="layout">
  <div class="sidebar">
    <h2>Past runs</h2>
    <div id="runList"></div>
  </div>
  <div class="main">
    <div class="header">
      <h1>Self-correcting agent playground</h1>
      <p>Give it a coding goal. Watch it plan, act, judge itself, and recover from failures — live.</p>
    </div>
    <div class="trace" id="trace">
      <div class="empty">No run yet. Try: "Write a function that checks if a string is a palindrome, with tests."</div>
    </div>
    <div class="composer">
      <label class="toggle"><input type="checkbox" id="selfCorrect" checked> self-correction</label>
      <input type="text" id="goalInput" placeholder="Describe a coding goal for the agent…">
      <button id="runBtn">Run</button>
    </div>
  </div>
</div>
<script>
const traceEl = document.getElementById('trace');
const runBtn = document.getElementById('runBtn');
const goalInput = document.getElementById('goalInput');
const selfCorrect = document.getElementById('selfCorrect');
const runList = document.getElementById('runList');

// ---------- DOM helpers. Everything that can contain arbitrary model/tool
// output is built via textContent, never string-interpolated into innerHTML,
// so escaping bugs and "wall of JSON" rendering can't happen. ----------

function h(tag, opts = {}, children = []) {
  const node = document.createElement(tag);
  if (opts.className) node.className = opts.className;
  if (opts.text !== undefined) node.textContent = opts.text;
  if (opts.html !== undefined) node.innerHTML = opts.html; // only ever used with our own trusted strings
  for (const c of children) if (c) node.appendChild(c);
  return node;
}

function guessLanguage(filename) {
  if (!filename) return 'plaintext';
  if (filename.endsWith('.py')) return 'python';
  if (filename.endsWith('.json')) return 'json';
  return 'plaintext';
}

function codeBlock(text, language) {
  const pre = h('pre', { className: 'codeblock' });
  const code = h('code', { text });
  if (language) code.className = 'language-' + language;
  pre.appendChild(code);
  if (window.hljs) hljs.highlightElement(code);
  return pre;
}

function plainBlock(text, isError) {
  return h('div', { className: isError ? 'error-block' : 'plain-block', text });
}

function labeled(labelText, node) {
  const wrap = document.createElement('div');
  wrap.appendChild(h('div', { className: 'block-label', text: labelText }));
  wrap.appendChild(node);
  return wrap;
}

// ---------- action rendering: code-shaped params (file content) become
// labeled, syntax-highlighted code blocks; short scalar params become chips ----------

const CODE_LIKE_KEYS = ['content'];

function renderAction(action) {
  const wrap = document.createElement('div');
  const line = h('div', { className: 'action-line' });
  line.appendChild(h('span', { className: 'tool-name', text: '▶ ' + action.tool_name }));

  const scalarEntries = Object.entries(action.tool_input || {}).filter(([k]) => !CODE_LIKE_KEYS.includes(k));
  for (const [k, v] of scalarEntries) {
    line.appendChild(h('span', { className: 'param-chip', text: `${k}: ${v}` }));
  }
  wrap.appendChild(line);

  const filename = (action.tool_input || {}).filename;
  for (const key of CODE_LIKE_KEYS) {
    if (action.tool_input && action.tool_input[key] !== undefined) {
      wrap.appendChild(labeled(key, codeBlock(action.tool_input[key], guessLanguage(filename))));
    }
  }
  return wrap;
}

// ---------- observation rendering: stdout/stderr/etc get their own labeled
// blocks with real line breaks instead of one JSON.stringify blob ----------

const STAT_KEYS = ['exit_code', 'passed', 'failed', 'bytes_written'];
const TEXT_BLOCK_KEYS = ['stdout', 'stderr', 'content'];

function renderObservation(toolResult) {
  const wrap = document.createElement('div');
  if (!toolResult.success) {
    wrap.appendChild(plainBlock(toolResult.error || 'Unknown error', true));
    return wrap;
  }
  const output = toolResult.output || {};

  const stats = STAT_KEYS.filter(k => output[k] !== undefined);
  if (stats.length) {
    const row = h('div', { className: 'stat-row' });
    for (const k of stats) {
      let cls = 'stat-pill';
      if (k === 'exit_code') cls += output[k] === 0 ? ' good' : ' bad';
      if (k === 'failed' && output[k] > 0) cls += ' bad';
      if (k === 'passed' && output[k] > 0) cls += ' good';
      row.appendChild(h('span', { className: cls, text: `${k}: ${output[k]}` }));
    }
    wrap.appendChild(row);
  }

  if (output.path) {
    wrap.appendChild(h('div', { className: 'plain-block', text: output.path }));
  }

  for (const key of TEXT_BLOCK_KEYS) {
    const val = output[key];
    if (val === undefined || val === null || val === '') continue;
    wrap.appendChild(labeled(key, plainBlock(val, false)));
  }

  const handled = new Set([...STAT_KEYS, ...TEXT_BLOCK_KEYS, 'path']);
  const rest = Object.entries(output).filter(([k]) => !handled.has(k));
  if (rest.length) {
    const row = h('div', { className: 'stat-row' });
    for (const [k, v] of rest) row.appendChild(h('span', { className: 'stat-pill', text: `${k}: ${v}` }));
    wrap.appendChild(row);
  }

  return wrap;
}

function planList(steps) {
  const ul = document.createElement('ul');
  for (const s of steps) {
    const li = document.createElement('li');
    li.appendChild(h('b', { text: s.id + ': ' }));
    li.appendChild(document.createTextNode(s.description));
    ul.appendChild(li);
  }
  return ul;
}

async function loadRuns() {
  const res = await fetch('/api/logs');
  const runs = await res.json();
  runList.innerHTML = '';
  for (const r of runs) {
    const item = h('div', { className: 'run-item' });
    const title = r.goal.length > 40 ? r.goal.slice(0, 40) + '…' : r.goal;
    item.appendChild(h('div', { text: title }));
    const meta = h('div', {
      text: `${r.self_correction_enabled ? 'self-correct' : 'baseline'} · ${r.completed ? 'done' : 'incomplete'} · ${r.self_corrections} corrections`,
    });
    meta.style.cssText = 'color:var(--muted); font-size:11px; margin-top:3px;';
    item.appendChild(meta);
    item.onclick = () => window.open('/logs/' + r.run_id, '_blank');
    runList.appendChild(item);
  }
}
loadRuns();

function addCard(node) {
  traceEl.appendChild(node);
  traceEl.scrollTop = traceEl.scrollHeight;
  return node;
}

runBtn.onclick = () => {
  const goal = goalInput.value.trim();
  if (!goal) return;
  traceEl.innerHTML = '';
  runBtn.disabled = true;
  goalInput.disabled = true;

  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const ws = new WebSocket(`${proto}://${location.host}/ws/run`);
  const cardsByStep = {};

  ws.onopen = () => ws.send(JSON.stringify({ goal, self_correction: selfCorrect.checked }));

  ws.onmessage = (msg) => {
    const ev = JSON.parse(msg.data);

    if (ev.type === 'plan_created') {
      const box = h('div', { className: 'plan-box' });
      box.appendChild(h('div', { className: 'plan-title', text: 'Plan' }));
      box.appendChild(planList(ev.plan.steps));
      addCard(box);

    } else if (ev.type === 'thought') {
      const key = ev.step_id + (ev.regenerated ? 'r' : '');
      const card = h('div', { className: 'card' });
      const head = h('div', { className: 'head' });
      head.appendChild(h('span', { text: `step ${ev.step_id}${ev.regenerated ? ' (regenerated)' : ''}` }));
      card.appendChild(head);
      card.appendChild(h('div', { className: 'thought', text: '💭 ' + ev.thought }));
      addCard(card);
      cardsByStep[key] = card;

    } else if (ev.type === 'action') {
      const key = ev.step_id + (ev.regenerated ? 'r' : '');
      const c = cardsByStep[key];
      if (c) c.appendChild(renderAction(ev.action));

    } else if (ev.type === 'observation') {
      const key = ev.step_id + (ev.regenerated ? 'r' : '');
      const c = cardsByStep[key];
      if (!c) return;
      const ok = ev.tool_result.success;
      c.querySelector('.head').appendChild(h('span', { className: 'badge ' + (ok ? 'ok' : 'fail'), text: ok ? 'success' : 'failed' }));
      c.appendChild(renderObservation(ev.tool_result));

    } else if (ev.type === 'self_evaluation') {
      const key = ev.step_id + (ev.regenerated ? 'r' : '');
      const c = cardsByStep[key];
      if (!c) return;
      const e = ev.evaluation;
      const box = h('div', { className: 'eval-box' });
      const line = h('div', {});
      line.appendChild(document.createTextNode('self-eval: '));
      line.appendChild(h('b', { text: e.failure_mode }));
      line.appendChild(document.createTextNode(` (confidence ${e.confidence.toFixed(2)})`));
      box.appendChild(line);
      box.appendChild(h('div', { text: e.rationale }));
      c.appendChild(box);

    } else if (ev.type === 'recovery') {
      const c = cardsByStep[ev.step_id];
      if (!c) return;
      const r = ev.recovery;
      const box = h('div', { className: 'recovery-box' });
      const line = h('div', {});
      line.appendChild(document.createTextNode('recovery: '));
      line.appendChild(h('b', { text: r.strategy }));
      box.appendChild(line);
      box.appendChild(h('div', { text: r.rationale }));
      c.appendChild(box);

    } else if (ev.type === 'replan') {
      const box = h('div', { className: 'plan-box' });
      box.appendChild(h('div', { className: 'plan-title', text: 'Replanned remaining steps' }));
      box.appendChild(planList(ev.new_steps));
      addCard(box);

    } else if (ev.type === 'step_abandoned') {
      const card = h('div', { className: 'card' });
      const head = h('div', { className: 'head' });
      head.appendChild(h('span', { className: 'badge fail', text: 'abandoned' }));
      head.appendChild(h('span', { text: 'step ' + ev.step_id }));
      card.appendChild(head);
      card.appendChild(h('div', { text: ev.reason }));
      addCard(card);

    } else if (ev.type === 'final') {
      const box = h('div', { className: 'final-box' });
      box.appendChild(h('div', { className: 'final-title', text: 'Final output' }));
      box.appendChild(h('div', { text: ev.final_output }));
      const link = h('a', { text: 'View full structured log ↗' });
      link.href = '/logs/' + ev.run_id;
      link.target = '_blank';
      const linkWrap = document.createElement('div');
      linkWrap.style.marginTop = '10px';
      linkWrap.appendChild(link);
      box.appendChild(linkWrap);
      addCard(box);

    } else if (ev.type === 'error') {
      const card = h('div', { className: 'card' });
      const head = h('div', { className: 'head' });
      head.appendChild(h('span', { className: 'badge fail', text: 'error' }));
      card.appendChild(head);
      card.appendChild(h('div', { text: ev.message }));
      addCard(card);
    }
  };

  ws.onclose = () => {
    runBtn.disabled = false;
    goalInput.disabled = false;
    loadRuns();
  };
};

goalInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') runBtn.click(); });
</script>
</body>
</html>
